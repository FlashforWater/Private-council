<svg width="1400" height="640" viewBox="0 0 1400 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Private Council</title>
  <desc id="desc">A cinematic AI council room with multiple advisor roles around a glowing decision table and holographic decision canvas.</desc>

  <defs>
    <radialGradient id="roomGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(692 326) rotate(90) scale(370 600)">
      <stop offset="0" stop-color="#1EE6C8" stop-opacity="0.28"/>
      <stop offset="0.34" stop-color="#3A7BFF" stop-opacity="0.18"/>
      <stop offset="0.72" stop-color="#10151F" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#07090D"/>
    </radialGradient>
    <linearGradient id="table" x1="327" y1="300" x2="1058" y2="496" gradientUnits="userSpaceOnUse">
      <stop stop-color="#121A24"/>
      <stop offset="0.52" stop-color="#1B2735"/>
      <stop offset="1" stop-color="#0B1018"/>
    </linearGradient>
    <linearGradient id="canvas" x1="792" y1="138" x2="1172" y2="405" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFFFFB" stop-opacity="0.92"/>
      <stop offset="0.5" stop-color="#A7D8FF" stop-opacity="0.56"/>
      <stop offset="1" stop-color="#5F7BFF" stop-opacity="0.16"/>
