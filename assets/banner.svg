      <stop stop-color="#FFFFFF"/>
      <stop offset="0.56" stop-color="#D7FFF6"/>
      <stop offset="1" stop-color="#8EBBFF"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.12 0 0 0 0 0.9 0 0 0 0 0.8 0 0 0 0.7 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <filter id="cardShadow" x="730" y="72" width="526" height="432" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" stroke="#88FFF1" stroke-opacity="0.055"/>
    </pattern>
  </defs>

  <rect width="1400" height="640" fill="#07090D"/>
  <rect width="1400" height="640" fill="url(#roomGlow)"/>
  <rect width="1400" height="640" fill="url(#grid)"/>

