      <stop offset="1" stop-color="#ECE6DA"/>
    </linearGradient>
    <linearGradient id="ink" x1="160" y1="86" x2="1040" y2="438" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2B2925"/>
      <stop offset="1" stop-color="#11100F"/>
    </linearGradient>
    <filter id="shadow" x="50" y="42" width="1100" height="440" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#3D3528" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="520" fill="url(#paper)"/>

