<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Private Council</title>
  <desc id="desc">A refined banner showing an AI council table, structured decision canvas, and traceable judgment path.</desc>

  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
